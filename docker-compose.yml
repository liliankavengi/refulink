version: '3.8'

services:
  db:
    image: postgres:14-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=refulink
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/refulink
    depends_on:
      - db

  # Frontend (React Native / Web) if applicable
  # contracts (Soroban Quickstart container can be added here)

volumes:
  postgres_data:
